spring:
  application:
    name: risks-api
  datasource:
    password: risks
    username: risks
    url: jdbc:postgresql://localhost:5432/risks
  jpa:
    open-in-view: false
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      client:
        registration:
          keycloak-admin-api:
            provider: keycloak
            client-id: ${app.admin-api.client-id}
            client-secret: ${app.admin-api.client-secret}
            client-authentication-method: client_secret_basic
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}
      # noinspection SpellCheckingInspection
      resourceserver:
        jwt:
          issuer-uri: "${app.keycloak.url}/realms/${app.keycloak.realm}"
springdoc:
  swagger-ui:
    oauth:
      client-id: ${app.open-api.client-id}
      client-secret: ${app.open-api.client-secret}
      app-name: ${app.open-api.client-id}
app:
  keycloak:
    url: http://localhost:9090
    # noinspection SpellCheckingInspection
    realm: norman
  admin-api:
    client-id: risks-api
    client-secret: admin-api-SECRET
  open-api:
    client-id: risks-openapi-ui
    client-secret: risks-openapi-ui-SECRET